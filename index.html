<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クラフトクエスト 〜残業なき世界へ〜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap');
  :root{--bg:#080b16;--panel:#0e1c38;--panel-lt:#1b3a6b;--frame:#f4f4ff;--gold:#f7c948;--green:#3ddc84;--red:#ff5d5d;--blue:#5ab9ff;--mp:#9d7cff;--text:#eef3ff;--kyoei:#1fa86a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:radial-gradient(circle at 50% -10%,#1b2a52 0%,var(--bg) 60%),var(--bg);color:var(--text);font-family:'DotGothic16',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:12px;image-rendering:pixelated;-webkit-font-smoothing:none;}
  .machine{width:100%;max-width:560px;}
  .title-bar{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--gold);text-align:center;line-height:1.8;margin-bottom:8px;text-shadow:2px 2px 0 #000;}
  .screen{background:#000;border:4px solid var(--frame);border-radius:6px;box-shadow:0 0 0 4px #000,0 12px 30px rgba(0,0,0,.6);overflow:hidden;position:relative;}
  .stage{height:300px;position:relative;overflow:hidden;background:linear-gradient(180deg,#10245c 0%,#1b3a6b 55%,#244e2e 55%,#15331f 100%);transition:background .6s;}
  .stage.field{background:linear-gradient(180deg,#10245c 0%,#1b3a6b 55%,#244e2e 55%,#15331f 100%);}
  .stage.office{background:linear-gradient(180deg,#2b2f45 0%,#3a3f5c 55%,#23263a 55%,#16182a 100%);}
  .stage.boss{background:linear-gradient(180deg,#2a0d2e 0%,#4a1530 55%,#1a0a14 55%,#0d0508 100%);}
  .stage.final{background:radial-gradient(circle at 50% 40%,#0c4a36 0%,#06251c 45%,#020a08 100%);}
  .stars{position:absolute;inset:0;opacity:.5;}
  .star{position:absolute;width:2px;height:2px;background:#fff;animation:tw 2s infinite;}
  @keyframes tw{0%,100%{opacity:.2}50%{opacity:1}}
  /* final boss aura */
  .aura{position:absolute;inset:0;display:none;pointer-events:none;background:radial-gradient(circle at 50% 45%,rgba(31,168,106,.35),transparent 55%);animation:pulse 1.6s infinite;}
  .aura.show{display:block;}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:.9}}
  .sigil{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);font-size:200px;color:rgba(31,168,106,.18);display:none;animation:spin 12s linear infinite;}
  .sigil.show{display:block;}
  @keyframes spin{from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(360deg)}}
  .sprite{position:absolute;line-height:1;filter:drop-shadow(0 6px 0 rgba(0,0,0,.45));}
  .enemy-sprite{left:50%;top:40%;transform:translate(-50%,-50%);font-size:90px;animation:float 2.2s ease-in-out infinite;}
  .enemy-sprite.bossbig{font-size:120px;}
  .enemy-sprite.is-img{width:150px;height:150px;font-size:0;}
  .enemy-sprite.is-img.bossbig{width:175px;height:175px;}
  .enemy-sprite.is-img.superboss{width:180px;height:180px;}
  .enemy-sprite.superboss{font-size:130px;filter:drop-shadow(0 0 18px rgba(31,168,106,.9));}
  @keyframes float{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-8px)}}
  .enemy-name{position:absolute;left:50%;top:74%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:9px;color:#fff;text-shadow:1px 1px 0 #000;text-align:center;}
  .hit{animation:hit .35s;}
  @keyframes hit{0%,100%{transform:translate(-50%,-50%)}20%{transform:translate(-58%,-50%)}40%{transform:translate(-42%,-50%)}60%{transform:translate(-54%,-50%)}80%{transform:translate(-46%,-50%)}}
  .flash{animation:fl .3s;}
  @keyframes fl{0%,100%{filter:none}50%{filter:brightness(4) saturate(0)}}
  .dmg-pop{position:absolute;left:50%;top:24%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:16px;color:var(--gold);text-shadow:2px 2px 0 #000;animation:pop 1s ease-out forwards;pointer-events:none;}
  @keyframes pop{0%{opacity:0;transform:translate(-50%,10px) scale(.6)}20%{opacity:1;transform:translate(-50%,-6px) scale(1.2)}100%{opacity:0;transform:translate(-50%,-40px) scale(1)}}
  /* skill name banner */
  .skill-banner{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Press Start 2P',monospace;font-size:12px;text-align:center;white-space:nowrap;padding:8px 14px;border-radius:4px;pointer-events:none;z-index:10;animation:banner 1.1s ease-out forwards;}
  @keyframes banner{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-80%) scale(.9)}}
  /* colored screen tint for skills */
  .skilltint{position:absolute;inset:0;opacity:0;pointer-events:none;z-index:6;}
  .skilltint.go{animation:tint .5s ease-out;}
  @keyframes tint{0%{opacity:0}20%{opacity:.55}100%{opacity:0}}
  /* enemy bounce up for heavy hits */
  .bonk{animation:bonk .45s ease-out;}
  @keyframes bonk{0%{transform:translate(-50%,-50%)}25%{transform:translate(-50%,-80%)}60%{transform:translate(-50%,-44%)}80%{transform:translate(-50%,-54%)}100%{transform:translate(-50%,-50%)}}
  /* キラーン（白い歯）演出 */
  .kirakira{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:72px;pointer-events:none;z-index:15;animation:kira .8s ease-out forwards;}
  @keyframes kira{0%{opacity:0;transform:scale(.3)}20%{opacity:1;transform:scale(1.4)}60%{opacity:1;transform:scale(1.1)}100%{opacity:0;transform:scale(1.2)}}
  /* 精神ダメージ演出 */
  .mental-fx{position:absolute;inset:0;background:radial-gradient(circle,rgba(156,120,255,.7) 0%,transparent 70%);pointer-events:none;z-index:6;animation:mental .7s ease-out forwards;}
  @keyframes mental{0%{opacity:0;transform:scale(.5)}30%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.3)}}
  /* 筋肉エフェクト */
  .muscle-fx{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);font-size:80px;pointer-events:none;z-index:15;animation:muscle .9s ease-out forwards;}
  @keyframes muscle{0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-20deg)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.3) rotate(5deg)}70%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}100%{opacity:0;transform:translate(-50%,-50%) scale(.8)}}
  .enemy-hpbar{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);width:62%;}
  .bar-track{height:10px;background:#000;border:2px solid var(--frame);border-radius:3px;overflow:hidden;}
  .bar-fill{height:100%;transition:width .4s;}
  /* full-screen flash for super boss entrance */
  .screenflash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:20;}
  .screenflash.go{animation:sflash 1.2s ease-out;}
  @keyframes sflash{0%{opacity:0}10%{opacity:1}100%{opacity:0}}
  .novel-portraits{position:absolute;inset:0;pointer-events:none;}
  .portrait{position:absolute;bottom:0;font-size:120px;line-height:1;filter:drop-shadow(0 0 12px rgba(0,0,0,.6));transition:opacity .25s,transform .25s,filter .25s;opacity:.35;}
  .portrait.is-img{width:200px;height:240px;font-size:0;}
  .portrait.left{left:6%;transform:scaleX(-1);}
  .portrait.left.is-img{transform:none;}
  .portrait.left.is-img.active{transform:translateY(-6px);}
  .portrait.right{right:6%;}
  .portrait.active{opacity:1;}
  .portrait.left.active{transform:scaleX(-1) translateY(-6px);}
  .portrait.right.active{transform:translateY(-6px);}
  .portrait.dim{opacity:.25;filter:drop-shadow(0 0 12px rgba(0,0,0,.6)) brightness(.5) grayscale(.4);}
  .overlay{position:absolute;inset:0;background:rgba(0,0,12,.93);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:24px;z-index:8;}
  .overlay.show{display:flex;animation:fade .4s;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .overlay h2{font-family:'Press Start 2P',monospace;font-size:15px;color:var(--gold);text-shadow:2px 2px 0 #000;line-height:1.8;}
  .overlay p{font-size:14px;line-height:1.7;max-width:460px;}
  .overlay .small{font-size:12px;color:#9ab;}
  .ov-btn{font-family:'DotGothic16';font-size:15px;cursor:pointer;background:var(--panel-lt);color:#fff;border:2px solid var(--frame);padding:10px 26px;border-radius:4px;}
  .ov-btn:hover{background:var(--gold);color:#000;}
  .big-emoji{font-size:60px;animation:float 2.2s ease-in-out infinite;}
  .big-emoji.is-img{width:160px;height:230px;font-size:0;background-position:center bottom;}
  .name-input{font-family:'DotGothic16';font-size:18px;text-align:center;padding:8px 12px;width:200px;border:2px solid var(--frame);border-radius:4px;background:#000;color:var(--gold);}
  .status{display:flex;gap:8px;padding:8px;background:var(--panel);border-top:3px solid var(--frame);font-size:13px;}
  .status .col{flex:1;}
  .status .name{font-family:'Press Start 2P';font-size:8px;color:var(--gold);margin-bottom:4px;}
  .meter{display:flex;align-items:center;gap:6px;margin:3px 0;}
  .meter .lbl{font-family:'Press Start 2P';font-size:7px;width:22px;}
  .mtrack{flex:1;height:9px;background:#000;border:1px solid #fff;border-radius:2px;overflow:hidden;}
  .mfill{height:100%;}
  .meter .val{font-size:11px;width:56px;text-align:right;}
  .msgbox{background:var(--panel);border-top:3px solid var(--frame);padding:12px 14px;min-height:96px;position:relative;cursor:pointer;}
  .speaker{font-family:'Press Start 2P';font-size:9px;color:var(--gold);margin-bottom:7px;display:none;}
  .speaker.show{display:block;}
  .dialogue{font-size:15px;line-height:1.6;}
  .next-arrow{position:absolute;right:12px;bottom:8px;color:var(--blue);font-size:14px;animation:bob 1s infinite;display:none;}
  .next-arrow.show{display:block;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
  .menu{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px;background:var(--panel);border-top:3px solid var(--frame);}
  .cmd{font-family:'DotGothic16';font-size:15px;cursor:pointer;background:var(--panel-lt);color:#fff;border:2px solid var(--frame);padding:11px 8px;border-radius:4px;text-align:left;position:relative;transition:.1s;}
  .cmd:before{content:'\25B6';position:absolute;left:6px;opacity:0;color:var(--gold);}
  .cmd:hover:before{opacity:1;}
  .cmd:hover{background:var(--gold);color:#000;padding-left:22px;}
  .cmd:disabled{opacity:.35;cursor:not-allowed;}
  .cmd:disabled:hover{background:var(--panel-lt);color:#fff;padding-left:8px;}
  .cmd:disabled:hover:before{opacity:0;}
  .cmd small{display:block;font-size:11px;opacity:.7;}
  .full{grid-column:1/3;}
  .back{font-size:12px;color:var(--blue);text-align:right;padding:4px 12px;background:var(--panel);cursor:pointer;}
  .hidden{display:none!important;}
  .footer{font-size:11px;text-align:center;color:#557;margin-top:8px;}
  .sound-toggle{position:absolute;top:8px;right:8px;z-index:9;font-size:11px;font-family:'Press Start 2P';background:rgba(0,0,0,.6);border:1px solid var(--frame);color:var(--gold);padding:5px 7px;cursor:pointer;border-radius:3px;}
</style>
</head>
<body>
<div class="machine">
  <div class="title-bar">CRAFT QUEST<br><span style="font-size:8px;color:#88a">- 残業なき世界へ -</span></div>
  <div class="screen">
    <button class="sound-toggle" id="soundToggle">♪ ON</button>
    <div id="saveToast" style="position:absolute;top:8px;left:8px;z-index:9;font-family:'Press Start 2P';font-size:8px;background:rgba(0,0,0,.7);border:1px solid var(--gold);color:var(--gold);padding:5px 7px;border-radius:3px;opacity:0;transition:opacity .3s;pointer-events:none;">SAVED</div>
    <div class="stage field" id="stage">
      <div class="stars" id="stars"></div>
      <div class="sigil" id="sigil">✦</div>
      <div class="aura" id="aura"></div>
      <div class="sprite enemy-sprite hidden" id="enemySprite">👹</div>
      <div class="enemy-name hidden" id="enemyName">てき</div>
      <div class="enemy-hpbar hidden" id="enemyHpBar"><div class="bar-track"><div class="bar-fill" id="enemyHpFill" style="width:100%;background:var(--red)"></div></div></div>
      <div class="novel-portraits hidden" id="novelPortraits">
        <div class="portrait left" id="portraitLeft">🦸</div>
        <div class="portrait right" id="portraitRight">😈</div>
      </div>
      <div class="screenflash" id="screenflash"></div>
      <div class="overlay show" id="titleScreen">
        <div class="big-emoji">🏗️</div>
        <h2>CRAFT QUEST</h2>
        <p class="small">事務作業の魔物にのまれた建設会社。<br>クラフトファイルの力で、残業なき世界をとりもどせ。</p>
        <button class="ov-btn" id="continueBtn" style="display:none">▶ つづきから</button>
        <button class="ov-btn" id="startBtn">▶ はじめから</button>
        <div id="saveInfo" class="small" style="min-height:16px"></div>
      </div>
      <div class="overlay" id="nameScreen">
        <div class="big-emoji" id="heroFace">🦸</div>
        <p>あなたの なまえを おしえて！<br><span class="small">(現場監督として たびに出ます)</span></p>
        <input class="name-input" id="nameInput" maxlength="6" placeholder="なまえ">
        <button class="ov-btn" id="nameOk">▶ けってい</button>
      </div>
    </div>
    <div class="status hidden" id="statusBar">
      <div class="col">
        <div class="name" id="heroName">ゆうしゃ Lv.1</div>
        <div class="meter"><span class="lbl">HP</span><div class="mtrack"><div class="mfill" id="hpFill" style="background:var(--green)"></div></div><span class="val" id="hpVal">30/30</span></div>
        <div class="meter"><span class="lbl">MP</span><div class="mtrack"><div class="mfill" id="mpFill" style="background:var(--mp)"></div></div><span class="val" id="mpVal">10/10</span></div>
        <div class="meter"><span class="lbl">EXP</span><div class="mtrack"><div class="mfill" id="expFill" style="background:var(--gold)"></div></div><span class="val" id="expVal">0/10</span></div>
      </div>
    </div>
    <div class="msgbox" id="msgbox">
      <div class="speaker" id="speaker">なまえ</div>
      <div class="dialogue" id="dialogue">クラフトファイルの ちからで たたかえ！</div>
      <div class="next-arrow" id="nextArrow">▼</div>
    </div>
    <div class="menu hidden" id="rootMenu">
      <button class="cmd" id="cmdAttack">こうげき<small>ふつうに しょりする</small></button>
      <button class="cmd" id="cmdSkill">とくぎ<small>クラフトファイルの きのう</small></button>
      <button class="cmd" id="cmdGuard">ぼうぎょ<small>HPとMPを かいふく</small></button>
      <button class="cmd" id="cmdRun">しきりなおし<small>HP/MPを 大きく回復</small></button>
    </div>
    <div id="skillMenu" class="hidden">
      <div class="menu" id="skillList"></div>
      <div class="back" id="skillBack">← もどる</div>
    </div>
  </div>
  <div class="footer">画面をタップで会話を送る／レベルアップで とくぎを おぼえる</div>
</div>
<script>
/* ===== AUDIO ===== */
const Audio8=(()=>{
  let ctx=null,master=null,on=true;
  /* BGM scheduler state */
  let bgmSeq=null,bgmStep=0,bgmNextTime=0,bgmRAF=null;
  const LOOKAHEAD=0.12; // 先読み秒数（iOSでも安定）
  const SCHEDULE_INTERVAL=50; // チェック間隔ms
  function init(){if(ctx)return;ctx=new(window.AudioContext||window.webkitAudioContext)();master=ctx.createGain();master.gain.value=0.35;master.connect(ctx.destination);}
  function resume(){if(ctx&&ctx.state==="suspended")ctx.resume();}
  function setOn(v){on=v;if(!on)stopBGM();}
  function isOn(){return on;}
  let reverb=null;
  function buildReverb(){
    reverb=ctx.createConvolver();
    const len=ctx.sampleRate*1.6,buf=ctx.createBuffer(2,len,ctx.sampleRate);
    for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.4);}
    reverb.buffer=buf;
    const wet=ctx.createGain();wet.gain.value=0.28;reverb.connect(wet);wet.connect(master);
  }
  /* ---- 基本音声 ---- */
  function voice(f,dur,type="square",vol=0.2,absTime=0,opt={}){
    if(!on||!ctx)return;
    const t=absTime||ctx.currentTime;
    const g=ctx.createGain();
    const a=opt.a!=null?opt.a:0.012,r=opt.r!=null?opt.r:dur*0.5;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+a);
    g.gain.exponentialRampToValueAtTime(vol*0.7,t+Math.min(dur,a+0.04));
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur+r);
    const detunes=opt.fat?[-7,0,7]:[0];
    detunes.forEach(dt=>{const o=ctx.createOscillator();o.type=type;o.frequency.setValueAtTime(f,t);if(dt)o.detune.setValueAtTime(dt,t);o.connect(g);o.start(t);o.stop(t+dur+r+0.03);});
    g.connect(master);
    if(reverb&&opt.rev!==false){const s=ctx.createGain();s.gain.value=opt.revAmt!=null?opt.revAmt:0.5;g.connect(s);s.connect(reverb);}
  }
  function tone(f,dur,type="square",vol=0.25,when=0){voice(f,dur,type,vol,ctx?ctx.currentTime+when:0,{rev:false,r:dur*0.4});}
  function noiseAt(dur,vol=0.3,absTime=0,hp=800){
    if(!on||!ctx)return;
    const t=absTime||ctx.currentTime;
    const buf=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*dur),ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const s=ctx.createBufferSource();s.buffer=buf;
    const g=ctx.createGain();g.gain.value=vol;
    const fl=ctx.createBiquadFilter();fl.type="highpass";fl.frequency.value=hp;
    s.connect(fl);fl.connect(g);g.connect(master);s.start(t);
  }
  function noise(dur,vol=0.3,when=0,hp=800){noiseAt(dur,vol,ctx?ctx.currentTime+when:0,hp);}
  /* ---- ドラム ---- */
  function kickAt(absTime,vol=0.5){
    if(!on||!ctx)return;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type="sine";o.frequency.setValueAtTime(150,absTime);o.frequency.exponentialRampToValueAtTime(45,absTime+0.13);
    g.gain.setValueAtTime(vol,absTime);g.gain.exponentialRampToValueAtTime(0.0001,absTime+0.18);
    o.connect(g);g.connect(master);o.start(absTime);o.stop(absTime+0.22);
  }
  function snareAt(absTime,vol=0.35){
    if(!on||!ctx)return;
    const buf=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*0.2),ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
    const s=ctx.createBufferSource();s.buffer=buf;
    const g=ctx.createGain();g.gain.value=vol;
    const f=ctx.createBiquadFilter();f.type="highpass";f.frequency.value=1400;
    s.connect(f);f.connect(g);g.connect(master);s.start(absTime);
  }
  function hatAt(absTime,vol=0.14){noiseAt(0.03,vol,absTime,7000);}
  function kick(when=0,vol=0.5){kickAt(ctx.currentTime+when,vol);}
  function snare(when=0,vol=0.35){snareAt(ctx.currentTime+when,vol);}
  /* ---- SFX ---- */
  const sfx={
    select:()=>tone(660,0.06,"square",0.2),
    talk:()=>tone(880,0.03,"square",0.07),
    attack:()=>{noise(0.12,0.25);tone(180,0.1,"sawtooth",0.2);},
    skill:()=>[523,659,784,1046].forEach((f,i)=>voice(f,0.16,"square",0.2,ctx.currentTime+i*0.05,{rev:true,revAmt:0.6})),
    hit:()=>{tone(120,0.12,"square",0.25);noise(0.08,0.2);},
    guard:()=>{voice(330,0.18,"triangle",0.2,ctx.currentTime,{rev:true});voice(440,0.18,"triangle",0.15,ctx.currentTime+0.05,{rev:true});},
    levelup:()=>[523,659,784,1046,1318].forEach((f,i)=>voice(f,0.22,"square",0.22,ctx.currentTime+i*0.09,{rev:true,revAmt:0.7})),
    victory:()=>{[523,523,523,659,784].forEach((f,i)=>voice(f,0.2,"square",0.22,ctx.currentTime+i*0.13,{rev:true,fat:true}));kick(0);kick(0.26);kick(0.52);},
    gameover:()=>[392,330,294,196].forEach((f,i)=>voice(f,0.5,"triangle",0.22,ctx.currentTime+i*0.28,{rev:true})),
    damage:()=>{tone(160,0.18,"sawtooth",0.25);noise(0.1,0.18);},

      if(b%4===0||b===10)kickAt(t,0.5);

    }else if(pat==="soft"){

      if(b===4||b===12)snareAt(t,0.22);

/* 絵文字 or 画像 をスプライト/立ち絵にセットする */
function setSpriteEl(el,charImg,emoji){
  if(charImg){
    el.textContent="";
    el.style.backgroundImage="url("+charImg+")";
    el.style.backgroundSize="contain";
    el.style.backgroundPosition="center";
    el.style.backgroundRepeat="no-repeat";
    el.classList.add("is-img");
  }else{
    el.style.backgroundImage="";
    el.classList.remove("is-img");
    el.textContent=emoji||"";
  }
}

/* ===== SAVE / LOAD (auto, single slot) ===== */
function progressLabel(p){
  if(p==="prologue")return "プロローグ";
  if(p&&p.indexOf("mob")===0){const i=parseInt(p.slice(3));return "第"+(i+1)+"の魔物の前";}
  if(p==="boss")return "魔王戦の前";
  if(p==="super1")return "裏ボス・SEIYA戦";
  if(p==="super2")return "裏ボス・REN戦";
  if(p==="done")return "クリア済み";
  return p;
}
async function saveGame(){
  const data={heroName,hero,progress,sound:Audio8.isOn()};
  try{
    await window.storage.set(SAVE_KEY,JSON.stringify(data),false);
    const t=$("saveToast");t.style.opacity="1";setTimeout(()=>t.style.opacity="0",1100);
  }catch(e){/* storage unavailable: fail silently */}
}
async function loadSaveInfo(){
  try{
    const r=await window.storage.get(SAVE_KEY,false);
    if(r&&r.value){
      const d=JSON.parse(r.value);
      $("continueBtn").style.display="";
      $("saveInfo").textContent=(d.heroName||"")+" Lv."+(d.hero?d.hero.lv:1)+" / "+progressLabel(d.progress);
      return d;
    }
  }catch(e){}
  return null;
}
async function deleteSave(){try{await window.storage.delete(SAVE_KEY,false);}catch(e){}}
function applySave(d){
  heroName=d.heroName||"れん";
  hero=Object.assign({lv:1,hp:40,maxhp:40,mp:12,maxmp:12,atk:10,exp:0,next:10},d.hero||{});
  progress=d.progress||"prologue";
  if(typeof d.sound==="boolean"){Audio8.setOn(d.sound);$("soundToggle").textContent=d.sound?"♪ ON":"♪ OFF";}
  refresh();
}
/* resume from a given progress marker */
function resumeFrom(p){
  if(p==="prologue"){stage=0;enterStage();return;}
  if(p&&p.indexOf("mob")===0){stage=parseInt(p.slice(3));enterStage();return;}
  if(p==="boss"){stage=ENEMIES.length-1;enterStage();return;}
  if(p==="super1"){enemy=Object.assign({},SUPER1,{maxhp:SUPER1.hp});superBossEntrance(SUPER1);return;}
  if(p==="super2"){enemy=Object.assign({},SUPER2,{maxhp:SUPER2.hp});superBossEntrance(SUPER2);return;}
  // done or unknown -> restart prologue
  stage=0;enterStage();
}

function enemyTurn(){
  let move=null;
  if(enemy.moves&&enemy.moves.length)move=enemy.moves[Math.floor(Math.random()*enemy.moves.length)];
  let base=enemy.atk+Math.floor(Math.random()*4);
  let dmg=move?Math.max(1,Math.round(base*move.mult)):base;
  if(guarding){dmg=Math.floor(dmg/2);guarding=false;}
  // 特殊技エフェクト
  if(move&&move.name)enemyMoveFx(move.name);
  hero.hp-=dmg;shake();
  if(move&&move.kind==="mental"){Audio8.sfx.skill();popDmg(dmg,"#c39bff");}
  else{Audio8.sfx.damage();popDmg(dmg,"var(--red)");}
  refresh();
  if(move){battleMsg(move.msg(heroName)+" "+dmg+"の ダメージ！");}
  else{battleMsg("『"+enemy.name+"』の こうげき！ "+dmg+"の ダメージ！");}
  if(hero.hp<=0){setTimeout(gameOver,800);return;}
  setTimeout(()=>lock(false),750);
}

  hero.hp=hero.maxhp;hero.mp=hero.maxmp;
  setSpriteEl(enemySprite,e.img,e.sprite);
  enemySprite.classList.toggle("bossbig",e.kind==="boss");
  enemySprite.classList.toggle("superboss",e.kind==="super"||e.kind==="final");
  enemyName.textContent=e.name;enemyHpFill.style.width="100%";
  const sup=(e.kind==="super"||e.kind==="final");
  setStageBG(sup?"final":e.kind==="boss"?"boss":"field");
  setFinalFx(sup);
  Audio8.playBGM(sup?"final":e.kind==="boss"?"boss":"battle");
  showBattleUI();
  battleMsg("『"+e.name+"』との たたかい！");
  lock(false);refresh();
}

$("cmdAttack").onclick=()=>{if(busy)return;Audio8.sfx.attack();lock(true);const d=dealDamage(hero.atk);battleMsg(heroName+"の こうげき！ "+d+"の ダメージ！");afterPlayerTurn();};
$("cmdGuard").onclick=()=>{if(busy)return;Audio8.sfx.guard();lock(true);guarding=true;const heal=Math.floor(hero.maxhp*0.2);const mpr=Math.floor(hero.maxmp*0.25);hero.hp=Math.min(hero.maxhp,hero.hp+heal);hero.mp=Math.min(hero.maxmp,hero.mp+mpr);refresh();battleMsg("たいせいを たてなおす！ HP+"+heal+" MP+"+mpr+" かいふく。");setTimeout(enemyTurn,650);};
$("cmdRun").onclick=()=>{if(busy)return;Audio8.sfx.select();const heal=Math.floor(hero.maxhp*0.25),mp=Math.floor(hero.maxmp*0.4);hero.hp=Math.min(hero.maxhp,hero.hp+heal);hero.mp=Math.min(hero.maxmp,hero.mp+mp);refresh();battleMsg("ふか呼吸して しきりなおした。HP+"+heal+" MP+"+mp+" かいふく！");lock(true);setTimeout(enemyTurn,650);};
$("cmdSkill").onclick=()=>{if(busy)return;Audio8.sfx.select();$("rootMenu").classList.add("hidden");$("skillMenu").classList.remove("hidden");const list=$("skillList");list.innerHTML="";SKILLS.filter(s=>s.lv<=hero.lv).forEach(s=>{const b=document.createElement("button");b.className="cmd full";b.innerHTML=s.name+"<small>MP"+s.mp+" / いりょく"+s.pow+"</small>";if(hero.mp<s.mp)b.disabled=true;b.onclick=()=>useSkill(s);list.appendChild(b);});};
$("skillBack").onclick=()=>{Audio8.sfx.select();$("skillMenu").classList.add("hidden");$("rootMenu").classList.remove("hidden");};
function useSkill(s){
  Audio8.sfx.skill();$("skillMenu").classList.add("hidden");$("rootMenu").classList.remove("hidden");lock(true);
  hero.mp-=s.mp;
  // 技専用エフェクト発動
  if(SKILL_FX[s.name])SKILL_FX[s.name]();
  setTimeout(()=>{const d=dealDamage(s.pow);battleMsg(s.line+" "+d+"の ダメージ！");afterPlayerTurn();},180);
}

function victory(){
  lock(true);Audio8.stopBGM();Audio8.sfx.victory();
  const e=enemy;
  enemySprite.style.transition="opacity .6s,transform .6s";enemySprite.style.opacity="0";enemySprite.style.transform="translate(-50%,-50%) scale(.3) rotate(20deg)";
  battleMsg("『"+e.name+"』を こえた！");
  setTimeout(()=>{
    enemySprite.style.transition="";enemySprite.style.opacity="1";enemySprite.style.transform="";
    if(e.kind==="super"){ // SEIYA倒した→蓮戦へ
      runNovel(e.post,"final",()=>{enemy=Object.assign({},SUPER2,{maxhp:SUPER2.hp});superBossEntrance(SUPER2);});
      return;
    }
    if(e.kind==="final"){ // 蓮倒した→フィナーレ
      runNovel(e.post,"final",finale);return;
    }
    if(e.kind==="boss"){ // 魔王倒した→裏ボス参戦
      gainExp(e);
      runNovel(SUPER_INTRO,"final",()=>{enemy=Object.assign({},SUPER1,{maxhp:SUPER1.hp});superBossEntrance(SUPER1);});
      return;
    }
    gainExp(e); // 通常
  },900);
}
function gainExp(e){hero.exp+=e.exp;let leveled=[];while(hero.exp>=hero.next){hero.exp-=hero.next;hero.lv++;hero.maxhp+=12;hero.maxmp+=5;hero.atk+=6;hero.hp=hero.maxhp;hero.mp=hero.maxmp;hero.next=Math.floor(hero.next*1.5);leveled.push(hero.lv);}refresh();
  if(e.kind==="boss"){if(leveled.length){const ns=SKILLS.filter(s=>leveled.includes(s.lv));}return;}
  if(leveled.length){Audio8.sfx.levelup();const ns=SKILLS.filter(s=>leveled.includes(s.lv));let body=heroName+"は レベル "+hero.lv+" に あがった！HP・MP・こうげきが アップ！";if(ns.length)body+=" あたらしいとくぎ『"+ns.map(s=>s.name).join("・")+"』を おぼえた！";runNovel([{who:"narr",t:body}],"field",nextStage);}
  else runNovel([{who:"narr",t:heroName+"は "+e.exp+" の けいけんちを えた。"}],"field",nextStage);
}
function nextStage(){stage++;hero.hp=Math.min(hero.maxhp,hero.hp+Math.floor(hero.maxhp*0.4));hero.mp=Math.min(hero.maxmp,hero.mp+Math.floor(hero.maxmp*0.4));refresh();if(stage>=ENEMIES.length){return;}enterStage();}
function enterStage(){const t=ENEMIES[stage];enemy=Object.assign({},t,{maxhp:t.hp});progress=(t.kind==="boss")?"boss":"mob"+stage;saveGame();setStageBG(t.kind==="boss"?"boss":"field");Audio8.playBGM(t.kind==="boss"?"boss":"battle");runNovel(t.pre,t.kind==="boss"?"boss":"field",startBattle);}

/* 派手な裏ボス登場演出 */
function superBossEntrance(boss){
  hideBattleUI();portraits.classList.add("hidden");
  setStageBG("final");setFinalFx(true);
  // bump hero so the fight is winnable
  if(hero.lv<12){const tgt=12;while(hero.lv<tgt){hero.lv++;hero.maxhp+=55;hero.maxmp+=8;hero.atk+=7;}hero.hp=hero.maxhp;hero.mp=hero.maxmp;refresh();}
  else{hero.hp=hero.maxhp;hero.mp=hero.maxmp;refresh();}
  progress=(boss.kind==="final")?"super2":"super1";saveGame();
  Audio8.stopBGM();Audio8.sfx.superboss();
  screenflash.classList.remove("go");void screenflash.offsetWidth;screenflash.classList.add("go");
  speaker.classList.remove("show");
  dialogue.innerHTML="<span style='color:var(--kyoei);font-family:Press Start 2P;font-size:11px;line-height:1.8'>!! 緊急参戦 !!</span><br>かくしボス『"+boss.name+"』 あらわれた！";
  nextArrow.classList.remove("show");
  // show enemy sprite dramatically
  setSpriteEl(enemySprite,boss.img,boss.sprite);enemySprite.classList.add("superboss");
  enemySprite.classList.remove("hidden");enemyName.textContent=boss.name;enemyName.classList.remove("hidden");
  enemySprite.style.opacity="0";enemySprite.style.transform="translate(-50%,-50%) scale(2.4)";
  enemySprite.style.transition="opacity 1s,transform 1s";
  setTimeout(()=>{enemySprite.style.opacity="1";enemySprite.style.transform="translate(-50%,-50%) scale(1)";},150);
  setTimeout(()=>{enemySprite.style.transition="";enemySprite.classList.add("hidden");enemyName.classList.add("hidden");runNovel(boss.pre,"final",startBattle);},1900);
}

function finale(){Audio8.playBGM("town");setFinalFx(false);progress="done";deleteSave();
  runNovel(FINALE,"office",()=>{
    pLeft.classList.add("active");pLeft.classList.remove("dim");pRight.classList.add("dim");speaker.classList.remove("show");
    dialogue.innerHTML="<span style='color:#f7c948;font-family:Press Start 2P;font-size:13px'>THE END</span><br>クリアおめでとう、"+heroName+"！<br><span style='font-size:12px;color:#9ab'>あなたは ふたりの創造主を 超えた。</span>";
    nextArrow.classList.remove("show");msgbox.style.cursor="pointer";msgbox.onclick=()=>location.reload();
  });
}
function gameOver(){Audio8.stopBGM();Audio8.sfx.gameover();runNovel([{who:"narr",t:heroName+"は たおれてしまった…"},{who:"hero",t:"くっ…でも、あきらめないぞ。何度でも 立ち向かってやる！"}],null,()=>{hero.hp=hero.maxhp;hero.mp=hero.maxmp;refresh();startBattle();});}

/* ===== START ===== */
let pendingSave=null;
$("startBtn").onclick=()=>{Audio8.init();Audio8.resume();Audio8.sfx.select();deleteSave();$("titleScreen").classList.remove("show");$("nameScreen").classList.add("show");};
$("continueBtn").onclick=()=>{
  Audio8.init();Audio8.resume();Audio8.sfx.select();
  if(!pendingSave){return;}
  applySave(pendingSave);
  $("titleScreen").classList.remove("show");
  // jump straight into the saved checkpoint
  resumeFrom(progress);
};
$("nameOk").onclick=()=>{const v=$("nameInput").value.trim();heroName=v||"れん";Audio8.sfx.select();$("nameScreen").classList.remove("show");Audio8.playBGM("town");progress="prologue";refresh();runNovel(PROLOGUE,"office",()=>{stage=0;enterStage();});};
$("soundToggle").onclick=()=>{const next=!Audio8.isOn();Audio8.setOn(next);$("soundToggle").textContent=next?"♪ ON":"♪ OFF";if(next&&phase==="battle"&&enemy){const sup=(enemy.kind==="super"||enemy.kind==="final");Audio8.playBGM(sup?"final":enemy.kind==="boss"?"boss":"battle");}};
refresh();
/* check for an existing save on load */
loadSaveInfo().then(d=>{if(d&&d.progress&&d.progress!=="done")pendingSave=d;else{$("continueBtn").style.display="none";}});
</script>
</body>
